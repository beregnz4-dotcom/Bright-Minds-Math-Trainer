<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bright Minds Math Trainer</title>

<style>
:root{
  --bg:#f7f3e8;
  --card:#ffffff;
  --text:#2b241f;
  --muted:#7a6f66;
  --line:#e8dfd3;
  --yellow:#f4b000;
  --purple:#7a4dff;
  --green:#27c36a;
  --red:#ff4b4b;
  --dark:#1f2430;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

.container{max-width:900px;margin:auto;padding:20px}

h1{margin-bottom:10px}

.tabs{display:flex;gap:10px;margin-bottom:15px}
.tab{
  padding:10px 14px;
  border-radius:10px;
  background:white;
  cursor:pointer;
  font-weight:bold;
}
.active{background:var(--yellow);color:white}

.section{display:none}
.section.active{display:block}

.card{
  background:var(--card);
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,.05);
}

.problem{
  font-size:70px;
  text-align:center;
  margin:20px;
  font-weight:bold;
}

.answer{
  font-size:40px;
  text-align:center;
  color:var(--green);
}

.controls{text-align:center}

button{
  padding:12px 16px;
  margin:5px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.start{background:var(--yellow);color:white}
.show{background:var(--purple);color:white}
.good{background:var(--green);color:white}
.bad{background:var(--red);color:white}
.next{background:var(--dark);color:white}

.timer, .stats, .lives{text-align:center;font-weight:bold;margin:10px}

input, select{
  padding:10px;
  border-radius:8px;
  border:1px solid var(--line);
}

.tableGrid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}

.tableCard{
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.header{
  background:var(--yellow);
  color:white;
  padding:6px;
  border-radius:6px;
  margin-bottom:6px;
}
</style>
</head>

<body>
<div class="container">

<h1>🚀 Math Trainer PRO v2</h1>

<div class="tabs">
  <div class="tab active" onclick="tab(0)">Flashcards</div>
  <div class="tab" onclick="tab(1)">Progreso</div>
  <div class="tab" onclick="tab(2)">Tablas</div>
</div>

<!-- FLASH -->
<div class="section active">

<div class="card">
  <h3>👧 Niños</h3>

  <input id="newChild" placeholder="Agregar niño">
  <button onclick="addChild()">Agregar</button>

  <select id="childSelect"></select>
</div>

<div class="card">
  <div id="checks"></div>

  Meta:
  <input id="goal" type="number" value="2" style="width:60px">

  <br><br>
  <button class="start" onclick="start()">START</button>
</div>

<div class="card">
  <div class="timer" id="timer">⏱ 0.0</div>
  <div class="lives" id="lives">❤️❤️❤️</div>

  <div class="problem" id="problem">—</div>
  <div class="answer" id="answer"></div>

  <div class="controls">
    <button class="show" onclick="showAnswer()">SHOW</button>
    <button class="good" onclick="mark(true)">BIEN</button>
    <button class="bad" onclick="mark(false)">MAL</button>
    <button class="next" onclick="next()">NEXT</button>
  </div>

  <div class="stats" id="stats"></div>
</div>

</div>

<!-- PROGRESO -->
<div class="section">
<div id="history"></div>
</div>

<!-- TABLAS -->
<div class="section">
<div class="tableGrid" id="tables"></div>
</div>

</div>

<script>
let problems=[],current;
let startTime,timerInterval;
let good=0,bad=0,lives=3;

function tab(i){
  document.querySelectorAll(".section").forEach((s,idx)=>s.classList.toggle("active",idx===i));
  document.querySelectorAll(".tab").forEach((t,idx)=>t.classList.toggle("active",idx===i));
  if(i===1) renderHistory();
}

function checks(){
let h="";
for(let i=2;i<=10;i++) h+=`<label><input type="checkbox" value="${i}" checked> ${i}</label> `;
document.getElementById("checks").innerHTML=h;
}
checks();

function getChildren(){
  return JSON.parse(localStorage.getItem("children")||"[]");
}

function saveChildren(list){
  localStorage.setItem("children",JSON.stringify(list));
}

function addChild(){
  let name=document.getElementById("newChild").value.trim();
  if(!name) return;

  let list=getChildren();
  list.push(name);
  saveChildren(list);
  loadChildren();
}

function loadChildren(){
  let sel=document.getElementById("childSelect");
  sel.innerHTML="";
  getChildren().forEach(n=>{
    let opt=document.createElement("option");
    opt.value=n;
    opt.textContent=n;
    sel.appendChild(opt);
  });
}
loadChildren();

function currentChild(){
  return document.getElementById("childSelect").value;
}

function tables(){
  return [...document.querySelectorAll("#checks input:checked")].map(x=>+x.value);
}

function build(){
  let list=[];
  tables().forEach(t=>{
    for(let i=1;i<=10;i++){
      list.push({q:`${t} x ${i}`,a:t*i});
    }
  });
  return list.sort(()=>Math.random()-0.5);
}

function start(){
  problems=build();
  good=0;bad=0;lives=3;
  updateLives();

  startTime=Date.now();
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    let t=((Date.now()-startTime)/1000).toFixed(1);
    timer.innerText="⏱ "+t+"s";
  },100);

  next();
}

function next(){
  if(lives<=0){finish();return;}
  if(problems.length===0){finish();return;}

  current=problems.pop();
  problem.innerText=current.q;
  answer.innerText="";
}

function showAnswer(){answer.innerText=current.a;}

function mark(ok){
  if(ok) good++;
  else{
    bad++;
    lives--;
    updateLives();
  }
  stats();
}

function updateLives(){
  livesEl.innerText="❤️".repeat(lives);
}

function stats(){
  let total=good+bad;
  let t=(Date.now()-startTime)/1000;
  let avg=total? (t/total).toFixed(2):0;

  statsEl.innerText=`✅ ${good} ❌ ${bad} ⚡ ${avg}s`;
}

const livesEl=document.getElementById("lives");
const statsEl=document.getElementById("stats");

function finish(){
  clearInterval(timerInterval);

  let t=((Date.now()-startTime)/1000).toFixed(1);
  let avg=(t/(good+bad)).toFixed(2);

  saveSession(t,avg);

  problem.innerText="🏁 DONE";
  answer.innerText=t+"s";
}

function getDB(){
  return JSON.parse(localStorage.getItem("mathDB")||"{}");
}

function saveDB(db){
  localStorage.setItem("mathDB",JSON.stringify(db));
}

function saveSession(time,avg){
  let name=currentChild();
  if(!name) return;

  let db=getDB();
  if(!db[name]) db[name]=[];

  db[name].push({time,avg,date:new Date().toLocaleString()});
  saveDB(db);
}

function renderHistory(){
  let db=getDB();
  let html="";

  Object.keys(db).forEach(name=>{
    html+=`<div class="card"><b>${name}</b><br>`;
    db[name].slice().reverse().forEach(s=>{
      html+=`${s.time}s | ${s.avg}s/prom<br>`;
    });
    html+="</div>";
  });

  document.getElementById("history").innerHTML=html;
}

function buildTables(){
let html="";
for(let t=1;t<=10;t++){
html+=`<div class="tableCard"><div class="header">${t}</div>`;
for(let i=1;i<=10;i++){
html+=`${t} x ${i} = ${t*i}<br>`;
}
html+=`</div>`;
}
tables.innerHTML=html;
}
buildTables();
</script>

</body>
</html>
