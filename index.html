<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bright Minds - Nivel 1</title>

<style>
body{
  margin:0;
  font-family:-apple-system, sans-serif;
  background:linear-gradient(135deg,#f6c667,#f29c6b);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:90%;
  max-width:420px;
  background:white;
  border-radius:25px;
  padding:25px;
  box-shadow:0 20px 40px rgba(0,0,0,.15);
  text-align:center;
}

h1{
  margin:0;
}

.question{
  font-size:40px;
  font-weight:bold;
  margin:20px 0;
}

.grid{
  display:grid;
  gap:6px;
  justify-content:center;
  margin:20px 0;
}

.cell{
  width:30px;
  height:30px;
  background:#4f46e5;
  border-radius:6px;
}

.answers{
  display:flex;
  gap:10px;
  justify-content:center;
}

.btn{
  flex:1;
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:18px;
  background:#eef2ff;
  cursor:pointer;
  transition:.2s;
}

.btn:hover{
  transform:scale(1.05);
}

.correct{
  background:#22c55e !important;
  color:white;
}

.wrong{
  background:#ef4444 !important;
  color:white;
}

.next{
  margin-top:15px;
  padding:14px;
  width:100%;
  border:none;
  border-radius:12px;
  background:#7c3aed;
  color:white;
  font-size:16px;
  display:none;
}
</style>
</head>

<body>

<div class="container">

<h1>Nivel 1</h1>

<div class="question" id="question"></div>

<div class="grid" id="grid"></div>

<div class="answers" id="answers"></div>

<button class="next" onclick="nextQuestion()">Siguiente</button>

</div>

<script>

const sounds={
  correct:new Audio("sounds/correct.mp3"),
  wrong:new Audio("sounds/wrong.mp3"),
  tap:new Audio("sounds/tap.mp3"),
  win:new Audio("sounds/win.mp3")
};

function playSound(name){
  if(sounds[name]){
    sounds[name].currentTime=0;
    sounds[name].play();
  }
}

let currentAnswer=0;

function generateQuestion(){

  let a=Math.floor(Math.random()*5)+1;
  let b=Math.floor(Math.random()*5)+1;

  currentAnswer=a*b;

  document.getElementById("question").innerText=`${a} × ${b}`;

  renderGrid(a,b);
  renderAnswers(currentAnswer);

}

function renderGrid(rows,cols){

  const grid=document.getElementById("grid");
  grid.innerHTML="";
  grid.style.gridTemplateColumns=`repeat(${cols},30px)`;

  for(let i=0;i<rows*cols;i++){
    let div=document.createElement("div");
    div.className="cell";
    grid.appendChild(div);
  }
}

function renderAnswers(correct){

  const container=document.getElementById("answers");
  container.innerHTML="";

  let options=[correct];

  while(options.length<3){
    let wrong=Math.floor(Math.random()*25)+1;
    if(!options.includes(wrong)){
      options.push(wrong);
    }
  }

  options.sort(()=>Math.random()-0.5);

  options.forEach(num=>{
    let btn=document.createElement("button");
    btn.className="btn";
    btn.innerText=num;

    btn.onclick=()=>checkAnswer(btn,num);

    container.appendChild(btn);
  });
}

function checkAnswer(button,value){

  playSound("tap");

  let buttons=document.querySelectorAll(".btn");

  buttons.forEach(b=>b.disabled=true);

  if(value===currentAnswer){
    button.classList.add("correct");
    playSound("correct");
    document.querySelector(".next").style.display="block";
  }else{
    button.classList.add("wrong");
    playSound("wrong");

    buttons.forEach(b=>{
      if(parseInt(b.innerText)===currentAnswer){
        b.classList.add("correct");
      }
    });

    setTimeout(()=>{
      nextQuestion();
    },1200);
  }
}

function nextQuestion(){
  document.querySelector(".next").style.display="none";
  generateQuestion();
}

generateQuestion();

</script>

</body>
</html>
