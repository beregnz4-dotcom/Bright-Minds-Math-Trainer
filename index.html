<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bright Minds Math</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#f4b000">

  <style>
    :root{
      --bg:#f7f8fc;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#e5e7eb;
      --yellow:#f4b000;
      --shadow:0 10px 30px rgba(17,24,39,.08);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:linear-gradient(180deg,#fbfcff,#eef2ff);
      color:var(--text);
    }

    .screen{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .card{
      width:min(460px,100%);
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      padding:24px;
      box-shadow:var(--shadow);
      text-align:center;
    }

    .logo{
      width:120px;
      max-width:50%;
      margin-bottom:8px;
    }

    h1{
      margin:8px 0 4px;
      font-size:28px;
    }

    .sub{
      color:var(--muted);
      font-weight:600;
      margin-bottom:18px;
    }

    input{
      width:100%;
      padding:14px 16px;
      border:1px solid var(--line);
      border-radius:14px;
      font-size:16px;
      margin-bottom:12px;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:6px;
    }

    button{
      border:none;
      border-radius:14px;
      padding:14px 16px;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
      -webkit-appearance:none;
      appearance:none;
    }

    .primary{
      background:var(--yellow);
      color:white;
    }

    .secondary{
      background:#eef2ff;
      color:var(--text);
    }

    .test-btn{
      margin-top:10px;
      width:100%;
      background:#111827;
      color:white;
    }

    .error{
      min-height:24px;
      margin-top:12px;
      color:#b91c1c;
      font-weight:700;
    }

    .hidden{
      display:none !important;
    }

    .app-wrap{
      max-width:900px;
      margin:auto;
      padding:24px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .brand img{
      width:56px;
      height:56px;
      border-radius:14px;
      object-fit:contain;
      background:white;
      padding:4px;
      box-shadow:var(--shadow);
    }

    .email{
      color:var(--muted);
      font-size:13px;
      font-weight:700;
      margin-top:4px;
    }

    .box{
      background:white;
      border:1px solid var(--line);
      border-radius:24px;
      padding:24px;
      box-shadow:var(--shadow);
    }

    .demo{
      margin-top:18px;
      font-size:42px;
      font-weight:900;
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="loginScreen" class="screen">
    <div class="card">
      <img src="logo.png" alt="Bright Minds" class="logo">
      <h1>Bright Minds Math</h1>
      <div class="sub">Acceso privado</div>

      <input id="loginEmail" type="email" placeholder="Correo electrónico">
      <input id="loginPassword" type="password" placeholder="Contraseña">

      <div class="actions">
        <button id="loginBtn" type="button" class="primary">Entrar</button>
        <button id="registerBtn" type="button" class="secondary">Crear cuenta</button>
      </div>

      <button id="testBtn" type="button" class="test-btn">Test Firebase</button>

      <div id="loginError" class="error"></div>
    </div>
  </div>

  <!-- APP -->
  <div id="appScreen" class="hidden">
    <div class="app-wrap">
      <div class="topbar">
        <div class="brand">
          <img src="logo.png" alt="Bright Minds">
          <div>
            <h1 style="font-size:26px; margin:0;">Bright Minds Math</h1>
            <div id="userEmail" class="email"></div>
          </div>
        </div>

        <button id="logoutBtn" type="button" class="secondary">Cerrar sesión</button>
      </div>

      <div class="box">
        <h2 style="margin-top:0;">✅ Login funcionando</h2>
        <p>Si estás viendo esta pantalla, Firebase ya está conectado correctamente.</p>
        <div class="demo">2 × 4 = 8</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCOaIl9c3n8BohutZN0-dEfD2TJIu28Ngk",
      authDomain: "bright-minds-math.firebaseapp.com",
      projectId: "bright-minds-math",
      storageBucket: "bright-minds-math.firebasestorage.app",
      messagingSenderId: "645800687175",
      appId: "1:645800687175:web:75241f3cac5e5433442362"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginScreen = document.getElementById("loginScreen");
    const appScreen = document.getElementById("appScreen");
    const loginEmail = document.getElementById("loginEmail");
    const loginPassword = document.getElementById("loginPassword");
    const loginBtn = document.getElementById("loginBtn");
    const registerBtn = document.getElementById("registerBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const testBtn = document.getElementById("testBtn");
    const loginError = document.getElementById("loginError");
    const userEmail = document.getElementById("userEmail");

    function showError(message) {
      loginError.textContent = message;
    }

    function clearError() {
      loginError.textContent = "";
    }

    function translateFirebaseError(code) {
      const map = {
        "auth/invalid-email": "Correo inválido.",
        "auth/missing-password": "Escribe una contraseña.",
        "auth/weak-password": "La contraseña debe tener al menos 6 caracteres.",
        "auth/email-already-in-use": "Ese correo ya está registrado.",
        "auth/invalid-credential": "Correo o contraseña incorrectos.",
        "auth/user-not-found": "Usuario no encontrado.",
        "auth/wrong-password": "Contraseña incorrecta."
      };
      return map[code] || "No se pudo completar la acción.";
    }

    async function registerUser() {
      const email = loginEmail.value.trim();
      const password = loginPassword.value.trim();
      clearError();

      try {
        await createUserWithEmailAndPassword(auth, email, password);
      } catch (error) {
        showError(translateFirebaseError(error.code));
      }
    }

    async function loginUser() {
      const email = loginEmail.value.trim();
      const password = loginPassword.value.trim();
      clearError();

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (error) {
        showError(translateFirebaseError(error.code));
      }
    }

    async function logoutUser() {
      await signOut(auth);
    }

    function testFirebase() {
      alert("Firebase conectado correctamente");
    }

    loginBtn.addEventListener("click", registerSafeLogin);
    registerBtn.addEventListener("click", registerSafeRegister);
    logoutBtn.addEventListener("click", logoutUser);
    testBtn.addEventListener("click", testFirebase);

    async function registerSafeLogin() {
      await loginUser();
    }

    async function registerSafeRegister() {
      await registerUser();
    }

    onAuthStateChanged(auth, (user) => {
      if (user) {
        loginScreen.classList.add("hidden");
        appScreen.classList.remove("hidden");
        userEmail.textContent = user.email || "";
      } else {
        appScreen.classList.add("hidden");
        loginScreen.classList.remove("hidden");
        userEmail.textContent = "";
      }
    });
  </script>
</body>
</html>
