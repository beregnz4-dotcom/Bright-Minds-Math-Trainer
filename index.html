<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bright Minds Math</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#f6c445,#f4a261);
}
.screen{display:none;padding:20px}
.active{display:block}

.card{
  background:white;
  border-radius:20px;
  padding:20px;
  margin-bottom:15px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin:8px 0;
}

.primary{background:#4CAF50;color:white}
.secondary{background:#2196F3;color:white}

.table-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
}

.table-btn{
  padding:10px;
  background:#eee;
  border-radius:10px;
  text-align:center;
}

.selected{background:#4CAF50;color:white}

.answers{display:flex;gap:10px}
.btn{flex:1;padding:12px;border-radius:10px}

.correct{background:green;color:white}
.wrong{background:red;color:white}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active">
  <div class="card">
    <h2>Login</h2>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button class="primary" onclick="login()">Login</button>
    <button onclick="signup()">Sign Up</button>
  </div>
</div>

<!-- PROFILES -->
<div id="profiles" class="screen">
  <div class="card">
    <h2>Profiles</h2>
    <div id="children"></div>
    <input id="childName" placeholder="Child name">
    <button onclick="addChild()">Add</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="screen">
  <div class="card">
    <h2>Bright Minds</h2>
    <button onclick="goSetup('level1')">🌱 Number Builder</button>
    <button onclick="goSetup('level2')">🚀 Skill Builder</button>
    <button onclick="goSetup('level3')">⚡ Speed Challenge</button>
    <button onclick="goSetup('level4')">🏆 Math Arena</button>
  </div>
</div>

<!-- SETUP -->
<div id="setup" class="screen">
  <div class="card">
    <h3>Select Tables</h3>
    <div id="tables" class="table-grid"></div>
    <button onclick="startGame()" class="primary">Start</button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="card">
    <h2 id="question"></h2>
    <div id="answers" class="answers"></div>
  </div>
</div>

<script>

// 🔥 CONFIGURA TU FIREBASE
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_DOMAIN",
  projectId: "TU_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let state = {
  childId:null,
  level:null,
  tables:[],
  correct:0,
  wrong:0
};

// LOGIN
function login(){
  auth.signInWithEmailAndPassword(
    email.value, password.value
  ).then(()=>go("profiles"))
  .catch(e=>alert(e.message));
}

function signup(){
  auth.createUserWithEmailAndPassword(
    email.value, password.value
  ).then(()=>go("profiles"))
  .catch(e=>alert(e.message));
}

// AUTO LOGIN
auth.onAuthStateChanged(user=>{
  if(user){
    loadChildren();
    go("profiles");
  }
});

// PROFILES
function loadChildren(){
  let user = auth.currentUser;
  db.collection("users").doc(user.uid).collection("children")
  .get().then(snap=>{
    children.innerHTML="";
    snap.forEach(doc=>{
      let b=document.createElement("button");
      b.innerText=doc.data().name;
      b.onclick=()=>{
        state.childId=doc.id;
        go("home");
      };
      children.appendChild(b);
    });
  });
}

function addChild(){
  let user = auth.currentUser;
  db.collection("users").doc(user.uid).collection("children")
  .add({name:childName.value,xp:0})
  .then(loadChildren);
}

// NAV
function go(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// SETUP
function goSetup(level){
  state.level=level;
  state.tables=[];
  renderTables();
  go("setup");
}

function renderTables(){
  tables.innerHTML="";
  for(let i=1;i<=10;i++){
    let b=document.createElement("div");
    b.className="table-btn";
    b.innerText=i;
    b.onclick=()=>{
      if(state.tables.includes(i)){
        state.tables=state.tables.filter(x=>x!=i);
        b.classList.remove("selected");
      }else{
        state.tables.push(i);
        b.classList.add("selected");
      }
    };
    tables.appendChild(b);
  }
}

// GAME
function startGame(){
  if(state.tables.length===0){
    alert("Select at least one table");
    return;
  }
  go("game");
  next();
}

function next(){
  let table = state.tables[Math.floor(Math.random()*state.tables.length)];
  let b = Math.ceil(Math.random()*10);

  let correct = table*b;
  state.currentAnswer = correct;

  question.innerText = `${table} × ${b}`;

  let opts=[correct];
  while(opts.length<3){
    let r=Math.ceil(Math.random()*100);
    if(!opts.includes(r)) opts.push(r);
  }
  opts.sort(()=>Math.random()-0.5);

  answers.innerHTML="";
  opts.forEach(o=>{
    let btn=document.createElement("button");
    btn.className="btn";
    btn.innerText=o;
    btn.onclick=()=>check(btn,o);
    answers.appendChild(btn);
  });
}

function check(btn,val){
  if(val===state.currentAnswer){
    btn.classList.add("correct");
    state.correct++;
  }else{
    btn.classList.add("wrong");
    state.wrong++;
  }

  saveProgress();

  setTimeout(next,800);
}

// FIRESTORE SAVE
function saveProgress(){
  let user = auth.currentUser;

  db.collection("users").doc(user.uid)
  .collection("children").doc(state.childId)
  .set({
    lastLevel:state.level,
    correct:state.correct,
    wrong:state.wrong
  },{merge:true});
}

</script>

</body>
</html>
