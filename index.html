<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bright Minds Math Trainer</title>

<style>
body{margin:0;font-family:system-ui;background:#f5f6fa}
.container{max-width:900px;margin:auto;padding:20px}
h1{text-align:center}

.tabs{display:flex;gap:10px;justify-content:center;margin-bottom:15px}
.tab{padding:10px 16px;border-radius:10px;background:#e5e7eb;cursor:pointer;font-weight:bold}
.active{background:#f4b000;color:white}

.section{display:none}
.section.active{display:block}

.card{
  background:white;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
  box-shadow:0 5px 15px rgba(0,0,0,.05);
}

.problem{
  font-size:120px;
  text-align:center;
  font-weight:900;
  margin:20px;
}

.answer{
  font-size:40px;
  text-align:center;
  color:#27c36a;
}

button{
  padding:12px 16px;
  margin:5px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.start{background:#f4b000;color:white}
.show{background:#7a4dff;color:white}
.good{background:#27c36a;color:white}
.bad{background:#ff4b4b;color:white}
.next{background:#1f2430;color:white}

.timer,.stats,.lives{text-align:center;font-weight:bold;margin:10px}

input,select{
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  width:100%;
  margin-bottom:10px;
}

.selectorBox{background:#f9fafb;padding:10px;border-radius:10px}
.chipsGrid{display:flex;flex-wrap:wrap;gap:10px}
.tableChip input{display:none}

.tableChip span{
  padding:10px;
  background:white;
  border-radius:20px;
  border:1px solid #ddd;
  cursor:pointer;
  font-weight:bold;
}

.tableChip input:checked + span{
  background:#f4b000;
  color:white;
}

.tableGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.tableCard{background:white;padding:10px;border-radius:10px;text-align:center}
.header{background:#f4b000;color:white;padding:6px;border-radius:6px;margin-bottom:6px}
</style>
</head>

<body>
<div class="container">

<h1>🎮 Math Trainer PRO</h1>

<div class="tabs">
  <div class="tab active" onclick="tab(0)">Juego</div>
  <div class="tab" onclick="tab(1)">Progreso</div>
  <div class="tab" onclick="tab(2)">Tablas</div>
</div>

<!-- JUEGO -->
<div class="section active">

<div class="card">
<h3>👧 Niños</h3>
<input id="newChild" placeholder="Nombre">
<button onclick="addChild()">Agregar</button>
<select id="childSelect"></select>
</div>

<div class="card selectorBox">
<div id="checks" class="chipsGrid"></div>

<button onclick="selectAll()">Todas</button>
<button onclick="clearAll()">Limpiar</button>

<input id="customList" placeholder="Ej: 4x7,3x5">
<button onclick="useHardMode()">Solo difíciles</button>
</div>

<button class="start" onclick="start()">START</button>

<div class="timer" id="timer">⏱ 0</div>
<div class="lives" id="lives">❤️❤️❤️</div>

<div class="problem" id="problem">—</div>
<div class="answer" id="answer"></div>

<div style="text-align:center">
<button class="show" onclick="showAnswer()">SHOW</button>
<button class="good" onclick="mark(true)">BIEN</button>
<button class="bad" onclick="mark(false)">MAL</button>
<button class="next" onclick="next()">NEXT</button>
</div>

<div class="stats" id="stats"></div>

</div>

<!-- PROGRESO -->
<div class="section">
<div id="history"></div>
</div>

<!-- TABLAS -->
<div class="section">
<div class="tableGrid" id="tables"></div>
</div>

</div>

<script>
let problems=[],current;
let startTime,timerInterval;
let good=0,bad=0,lives=3;
let mode="normal";

function tab(i){
document.querySelectorAll(".section").forEach((s,idx)=>s.classList.toggle("active",idx===i));
document.querySelectorAll(".tab").forEach((t,idx)=>t.classList.toggle("active",idx===i));
if(i===1) renderHistory();
}

function checks(){
let h="";
for(let i=2;i<=10;i++){
h+=`<label class="tableChip">
<input type="checkbox" value="${i}" checked>
<span>${i}</span>
</label>`;
}
checksDiv.innerHTML=h;
}
const checksDiv=document.getElementById("checks");
checks();

function selectAll(){document.querySelectorAll("#checks input").forEach(x=>x.checked=true)}
function clearAll(){document.querySelectorAll("#checks input").forEach(x=>x.checked=false)}

function tables(){
return [...document.querySelectorAll("#checks input:checked")].map(x=>+x.value);
}

function getChildren(){return JSON.parse(localStorage.getItem("children")||"[]")}
function saveChildren(c){localStorage.setItem("children",JSON.stringify(c))}

function addChild(){
let n=newChild.value.trim();
if(!n)return;
let c=getChildren();c.push(n);saveChildren(c);loadChildren();
}

function loadChildren(){
childSelect.innerHTML="";
getChildren().forEach(n=>{
let o=document.createElement("option");
o.textContent=n;
childSelect.appendChild(o);
});
}
loadChildren();

function currentChild(){return childSelect.value}

function getWeak(){return JSON.parse(localStorage.getItem("weak")||"{}")}
function saveWeak(d){localStorage.setItem("weak",JSON.stringify(d))}

function registerWrong(f){
let c=currentChild();
let d=getWeak();
if(!d[c])d[c]={};
if(!d[c][f])d[c][f]=0;
d[c][f]++;
saveWeak(d);
}

function getHard(){
let c=currentChild();
let d=getWeak()[c]||{};
return Object.keys(d);
}

function useHardMode(){mode="hard"}

function build(){
let list=[];
let custom=customList.value.trim();

if(custom){
custom.split(",").forEach(x=>{
let[a,b]=x.split("x").map(Number);
if(a&&b)list.push({q:`${a}x${b}`,a:a*b});
});
}

else if(mode==="hard"){
getHard().forEach(f=>{
let[a,b]=f.split("x").map(Number);
list.push({q:f,a:a*b});
});
}

else{
tables().forEach(t=>{
for(let i=1;i<=10;i++){
list.push({q:`${t}x${i}`,a:t*i});
}
});
}

return list.sort(()=>Math.random()-0.5);
}

function start(){
problems=build();
good=0;bad=0;lives=3;
updateLives();

startTime=Date.now();
clearInterval(timerInterval);
timerInterval=setInterval(()=>{
timer.innerText="⏱ "+((Date.now()-startTime)/1000).toFixed(1);
},100);

next();
}

function next(){
if(lives<=0||problems.length===0){finish();return;}
current=problems.pop();
problem.innerText=current.q;
answer.innerText="";
}

function showAnswer(){answer.innerText=current.a}

function mark(ok){
if(ok)good++;
else{
bad++;lives--;
updateLives();
registerWrong(current.q);
}
stats();
}

function updateLives(){livesDiv.innerText="❤️".repeat(lives)}
const livesDiv=document.getElementById("lives");

function stats(){
let t=(Date.now()-startTime)/1000;
let total=good+bad;
let avg=total?(t/total).toFixed(2):0;
statsDiv.innerText=`⭐ ${good} ❌ ${bad} ⚡ ${avg}s`;
}
const statsDiv=document.getElementById("stats");

function finish(){
clearInterval(timerInterval);
problem.innerText="🏁 FIN";
}

function renderHistory(){
let db=JSON.parse(localStorage.getItem("mathDB")||"{}");
let html="";
Object.keys(db).forEach(n=>{
html+=`<div class="card"><b>${n}</b><br>`;
db[n].forEach(s=>{
html+=`${s}<br>`;
});
html+="</div>";
});
history.innerHTML=html;
}

function buildTables(){
let h="";
for(let t=1;t<=10;t++){
h+=`<div class="tableCard"><div class="header">${t}</div>`;
for(let i=1;i<=10;i++)h+=`${t}x${i}=${t*i}<br>`;
h+=`</div>`;
}
tablesDiv.innerHTML=h;
}
const tablesDiv=document.getElementById("tables");
buildTables();
</script>

</body>
</html>
