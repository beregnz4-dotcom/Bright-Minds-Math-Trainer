<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bright Minds Math</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    :root{
      --bg-1:#f6c445;
      --bg-2:#f4a261;
      --card:#ffffff;
      --text:#24324b;
      --muted:#6b7280;
      --blue:#2d8cff;
      --blue-dark:#1f6fcb;
      --green:#22c55e;
      --red:#ef4444;
      --shadow:0 10px 24px rgba(0,0,0,.12);
      --radius:24px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html, body{
      margin:0;
      padding:0;
      font-family:Arial, Helvetica, sans-serif;
      background:#f2f2f2;
      color:var(--text);
    }

    body{
      min-height:100vh;
    }

    .app-shell{
      max-width:500px;
      min-height:100vh;
      margin:0 auto;
      background:
        linear-gradient(135deg, rgba(255,255,255,.12), transparent 30%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
    }

    .screen{
      display:none;
      min-height:100vh;
      padding:18px 18px 30px;
    }

    .screen.active{
      display:block;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:14px;
    }

    .topbar-title{
      flex:1;
      text-align:center;
      font-size:22px;
      font-weight:800;
      line-height:1.1;
    }

    .icon-btn,
    .back-btn,
    .primary-btn,
    .secondary-btn,
    .main-btn,
    .child-card,
    .danger-btn{
      border:none;
      cursor:pointer;
      font-weight:800;
    }

    .icon-btn,
    .back-btn{
      width:46px;
      height:46px;
      border-radius:16px;
      background:#fff;
      color:var(--blue);
      box-shadow:var(--shadow);
      font-size:22px;
    }

    .hero,
    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .hero{
      padding:24px 18px;
      text-align:center;
      margin-top:8px;
    }

    .hero h1{
      margin:8px 0;
      font-size:34px;
      line-height:1.02;
      color:var(--blue-dark);
    }

    .subtitle{
      color:var(--muted);
      font-size:14px;
    }

    .card{
      padding:16px;
      margin-top:14px;
    }

    .section-title{
      font-size:22px;
      font-weight:800;
      margin:6px 0 12px;
    }

    .input{
      width:100%;
      border:none;
      border-radius:18px;
      padding:14px 16px;
      font-size:16px;
      background:#fff;
      box-shadow: inset 0 0 0 2px #e5e7eb;
      margin-bottom:10px;
    }

    .primary-btn{
      width:100%;
      background:var(--green);
      color:#fff;
      border-radius:18px;
      padding:14px 18px;
      margin-top:8px;
    }

    .secondary-btn{
      width:100%;
      background:var(--blue);
      color:#fff;
      border-radius:18px;
      padding:14px 18px;
      margin-top:8px;
    }

    .danger-btn{
      width:100%;
      background:var(--red);
      color:#fff;
      border-radius:18px;
      padding:14px 18px;
      margin-top:8px;
    }

    .menu-list{
      display:flex;
      flex-direction:column;
      gap:14px;
      margin-top:18px;
    }

    .main-btn{
      background:var(--blue);
      color:#fff;
      border-radius:24px;
      padding:16px 18px;
      box-shadow:0 8px 0 var(--blue-dark);
      text-align:center;
      width:100%;
    }

    .main-btn:active,
    .primary-btn:active,
    .secondary-btn:active,
    .danger-btn:active{
      transform:translateY(2px);
    }

    .main-btn .big{
      font-size:18px;
      font-weight:800;
    }

    .main-btn .small{
      font-size:12px;
      margin-top:4px;
      opacity:.96;
    }

    .placeholder{
      padding:24px 16px;
      border-radius:18px;
      background:#f8fafc;
      color:var(--muted);
      text-align:center;
      font-size:14px;
      border:2px dashed #d1d5db;
    }

    .children-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .child-card{
      width:100%;
      background:#fff;
      border-radius:18px;
      padding:14px 16px;
      box-shadow:var(--shadow);
      text-align:left;
      font-size:16px;
      color:var(--blue-dark);
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .child-name{
      font-weight:700;
    }

    .mini-btn{
      border:none;
      background:#fee2e2;
      color:#991b1b;
      border-radius:12px;
      padding:8px 10px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
    }

    .status{
      margin-top:10px;
      font-size:14px;
      color:var(--muted);
      text-align:center;
      min-height:18px;
    }
  </style>
</head>
<body>
  <div class="app-shell">

    <!-- LOGIN -->
    <section id="screen-login" class="screen active">
      <div class="hero">
        <div class="subtitle">Bright Minds Math</div>
        <h1>Welcome Back</h1>
        <div class="subtitle">Login and continue learning</div>
      </div>

      <div class="card">
        <div class="section-title">Login</div>
        <input id="loginEmail" class="input" placeholder="Email" />
        <input id="loginPassword" class="input" type="password" placeholder="Password" />
        <button class="primary-btn" onclick="loginUser()">Login</button>
        <button class="secondary-btn" onclick="signupUser()">Create account</button>
        <div id="loginStatus" class="status"></div>
      </div>
    </section>

    <!-- PROFILES -->
    <section id="screen-profiles" class="screen">
      <div class="topbar">
        <button class="back-btn" onclick="logoutUser()">←</button>
        <div class="topbar-title">Profiles</div>
        <button class="icon-btn" onclick="loadChildren()">↻</button>
      </div>

      <div class="card">
        <div class="section-title">Choose a child</div>
        <div id="childrenList" class="children-list"></div>
      </div>

      <div class="card">
        <div class="section-title">Add profile</div>
        <input id="newChildName" class="input" placeholder="Child name" />
        <button class="primary-btn" onclick="addChild()">Add child</button>
        <div id="profileStatus" class="status"></div>
      </div>
    </section>

    <!-- HOME -->
    <section id="screen-home" class="screen">
      <div class="topbar">
        <button class="icon-btn" onclick="showScreen('screen-profiles')">←</button>
        <div class="topbar-title">Bright Minds</div>
        <button class="icon-btn" onclick="logoutUser()">⎋</button>
      </div>

      <div class="hero">
        <div class="subtitle">Selected child</div>
        <h1 id="homeChildName">Child</h1>
        <div class="subtitle">Choose a mode to continue</div>
      </div>

      <div class="menu-list">
        <button class="main-btn">
          <div class="big">🌱 Number Builder</div>
          <div class="small">Build your understanding of multiplication</div>
        </button>

        <button class="main-btn">
          <div class="big">🚀 Skill Builder</div>
          <div class="small">Practice and strengthen your skills</div>
        </button>

        <button class="main-btn">
          <div class="big">⚡ Speed Challenge</div>
          <div class="small">Solve faster and improve your time</div>
        </button>

        <button class="main-btn">
          <div class="big">🏆 Math Arena</div>
          <div class="small">Compete and show your level</div>
        </button>
      </div>
    </section>

  </div>

  <script>
    // =========================
    // FIREBASE CONFIG
    // =========================
    const firebaseConfig = {
      apiKey: "TU_API_KEY",
      authDomain: "TU_AUTH_DOMAIN",
      projectId: "TU_PROJECT_ID",
      storageBucket: "TU_STORAGE_BUCKET",
      messagingSenderId: "TU_MESSAGING_SENDER_ID",
      appId: "TU_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // =========================
    // APP STATE
    // =========================
    let appState = {
      currentChildId: null,
      currentChildName: null
    };

    // =========================
    // NAVIGATION
    // =========================
    function showScreen(screenId){
      document.querySelectorAll('.screen').forEach(screen=>{
        screen.classList.remove('active');
      });
      document.getElementById(screenId).classList.add('active');
    }

    // =========================
    // AUTH
    // =========================
    async function signupUser(){
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      const status = document.getElementById('loginStatus');

      if(!email || !password){
        status.textContent = 'Please enter email and password.';
        return;
      }

      try{
        status.textContent = 'Creating account...';
        await auth.createUserWithEmailAndPassword(email, password);
        status.textContent = '';
      }catch(error){
        status.textContent = error.message;
      }
    }

    async function loginUser(){
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      const status = document.getElementById('loginStatus');

      if(!email || !password){
        status.textContent = 'Please enter email and password.';
        return;
      }

      try{
        status.textContent = 'Logging in...';
        await auth.signInWithEmailAndPassword(email, password);
        status.textContent = '';
      }catch(error){
        status.textContent = error.message;
      }
    }

    async function logoutUser(){
      try{
        await auth.signOut();
        appState.currentChildId = null;
        appState.currentChildName = null;
        showScreen('screen-login');
      }catch(error){
        alert(error.message);
      }
    }

    auth.onAuthStateChanged(async (user)=>{
      if(user){
        await ensureUserDoc(user);
        await loadChildren();
        showScreen('screen-profiles');
      }else{
        showScreen('screen-login');
      }
    });

    async function ensureUserDoc(user){
      const userRef = db.collection('users').doc(user.uid);
      const snap = await userRef.get();

      if(!snap.exists){
        await userRef.set({
          email: user.email,
          createdAt: Date.now()
        });
      }
    }

    // =========================
    // CHILDREN
    // =========================
    async function addChild(){
      const input = document.getElementById('newChildName');
      const status = document.getElementById('profileStatus');
      const name = input.value.trim();
      const user = auth.currentUser;

      if(!name){
        status.textContent = 'Please enter a child name.';
        return;
      }

      if(!user){
        status.textContent = 'No active user session.';
        return;
      }

      try{
        status.textContent = 'Saving child...';
        await db.collection('users')
          .doc(user.uid)
          .collection('children')
          .add({
            name,
            xp: 0,
            createdAt: Date.now()
          });

        input.value = '';
        status.textContent = 'Child added.';
        await loadChildren();
      }catch(error){
        status.textContent = error.message;
      }
    }

    async function loadChildren(){
      const list = document.getElementById('childrenList');
      const status = document.getElementById('profileStatus');
      const user = auth.currentUser;

      list.innerHTML = '';

      if(!user){
        return;
      }

      try{
        status.textContent = 'Loading profiles...';

        const snapshot = await db.collection('users')
          .doc(user.uid)
          .collection('children')
          .orderBy('createdAt', 'asc')
          .get();

        if(snapshot.empty){
          list.innerHTML = '<div class="placeholder">No profiles yet. Add your first child.</div>';
          status.textContent = '';
          return;
        }

        snapshot.forEach(doc=>{
          const child = doc.data();

          const row = document.createElement('div');
          row.className = 'child-card';

          row.innerHTML = `
            <span class="child-name">${child.name}</span>
            <button class="mini-btn" type="button">Delete</button>
          `;

          row.onclick = () => {
            selectChild(doc.id, child.name);
          };

          row.querySelector('.mini-btn').onclick = async (event) => {
            event.stopPropagation();
            await deleteChild(doc.id);
          };

          list.appendChild(row);
        });

        status.textContent = '';
      }catch(error){
        status.textContent = error.message;
      }
    }

    function selectChild(childId, childName){
      appState.currentChildId = childId;
      appState.currentChildName = childName;
      document.getElementById('homeChildName').textContent = childName;
      showScreen('screen-home');
    }

    async function deleteChild(childId){
      const user = auth.currentUser;
      if(!user) return;

      const confirmDelete = confirm('Delete this profile?');
      if(!confirmDelete) return;

      try{
        await db.collection('users')
          .doc(user.uid)
          .collection('children')
          .doc(childId)
          .delete();

        await loadChildren();
      }catch(error){
        alert(error.message);
      }
    }
  </script>
</body>
</html>
